<script>
    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        document.getElementById('status').innerText = "جاري معالجة الصورة...";
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
            const base64 = reader.result.split(',')[1];
            // بنبعت الصورة خام للإضافة وهي تتصرف في الرفع
            window.postMessage({ type: "ACCUDENT_SEND_IMAGE", data: base64 }, "*");
        };
    };

    window.addEventListener("message", (event) => {
        if (event.data.type === "ACCUDENT_FINAL_REPORT") {
            document.getElementById('status').innerText = "اكتمل التحليل ✅";
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('reportContent').innerText = event.data.text;
        }
    });
</script>
